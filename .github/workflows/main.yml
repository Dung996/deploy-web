name: Deploy with Ansible
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # BƯỚC QUAN TRỌNG NHẤT: Tải code từ GitHub về máy ảo để lấy file deploy.yml
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: deploy.yml
          inventory: |
            [web]
            ${{ secrets.HOST }} ansible_user=root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            -i inventory
