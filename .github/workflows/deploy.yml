name: Deploy

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Set deploy path
        id: path
        run: |
          if [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "TARGET=/var/www/dev/html" >> $GITHUB_OUTPUT
            echo "APP_DIR=/var/www/dev" >> $GITHUB_OUTPUT

          elif [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            echo "TARGET=/var/www/staging/html" >> $GITHUB_OUTPUT
            echo "APP_DIR=/var/www/staging" >> $GITHUB_OUTPUT

          else
            echo "TARGET=/var/www/prod/html" >> $GITHUB_OUTPUT
            echo "APP_DIR=/var/www/prod" >> $GITHUB_OUTPUT
          fi

      - name: Deploy code to VPS
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ root@${{ secrets.HOST }}:${{ steps.path.outputs.TARGET }}

      - name: Restart Docker Compose
        run: |
          ssh root@${{ secrets.HOST }} << 'EOF'
            cd ${{ steps.path.outputs.APP_DIR }}
            docker-compose up -d
          EOF
