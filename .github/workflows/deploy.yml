name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync code to VPS
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" ./ \
          ${{ secrets.USER }}@${{ secrets.HOST }}:/var/www/app

      - name: Deploy on VPS (build + restart nginx)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.USER }}@${{ secrets.HOST }} << 'EOF'

          cd /var/www/app

          # nếu là frontend (React/Vite/Next static)
          # npm install
          # npm run build

          # restart nginx để load lại file mới
          sudo systemctl restart nginx

          EOF
