name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -avz --delete ./ \
          ${{ secrets.USER }}@${{ secrets.HOST }}:/var/www/app

      - name: Deploy on VPS (build + restart nginx)
        run: |
          ssh ${{ secrets.USER }}@${{ secrets.HOST }} << 'EOF'

          cd /var/www/app

          # nếu là frontend (React/Vite/Next static)
          # npm install
          # npm run build

          # restart nginx để load lại file mới
          sudo systemctl restart nginx

          EOF
