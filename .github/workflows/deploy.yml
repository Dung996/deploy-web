name: Deploy with Ansible
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: deploy.yml # Tên file ansible của bạn
          inventory: |
            [web]
            ${{ secrets.HOST }} ansible_user=${{ secrets.USERNAME }} ansible_ssh_private_key_file=id_rsa
          key: ${{ secrets.SSH_KEY }}
          options: --extra-vars "repo_url=https://github.com/${{ github.repository }}.git"
