name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Tạo thư mục nếu chưa có
            sudo mkdir -p /var/www/app
            sudo chown -R root:root /var/www/app
            cd /var/www/app

            # 2. Kiểm tra nếu đã có git thì pull, chưa có thì clone
            if [ -d ".git" ]; then
              echo "Thư mục đã có code, đang cập nhật..."
              sudo git fetch --all
              sudo git reset --hard origin/main
            else
              echo "Thư mục trống, đang clone mới..."
              sudo git clone https://github.com/Dung996/deploy-web.git .
            fi

            # 3. Chạy Docker (Đảm bảo file docker-compose.yml có trong repo của bạn)
            sudo docker compose up -d --build
