name: Deploy with Ansible
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # BƯỚC THIẾU QUAN TRỌNG: Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: deploy.yml
          inventory: |
            [web]
            ${{ secrets.HOST }} ansible_user=root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Tui đã tối giản options để tránh lỗi đường dẫn
          options: |
            --inventory-file inventory
