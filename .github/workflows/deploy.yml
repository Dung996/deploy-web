name: Deploy to Nginx VPS
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Đảm bảo Nginx đã được cài đặt
            if ! command -v nginx &> /dev/null; then
              sudo apt update && sudo apt install -y nginx
            fi

            # 2. Vào thư mục web (thường Nginx dùng /var/www/html)
            # Bạn có thể đổi /var/www/app thành /var/www/html nếu muốn
            sudo mkdir -p /var/www/app
            cd /var/www/app

            # 3. Cập nhật code
            if [ -d ".git" ]; then
              sudo git fetch --all
              sudo git reset --hard origin/main
            else
              sudo rm -rf ..?* .[!.]* *
              sudo git clone https://github.com/Dung996/deploy-web.git .
            fi

            # 4. Phân quyền cho Nginx đọc được file
            sudo chown -R www-data:www-data /var/www/app
            sudo chmod -R 755 /var/www/app

            # 5. Reload Nginx để cập nhật thay đổi (nếu có đổi config)
            sudo nginx -t && sudo systemctl reload nginx
