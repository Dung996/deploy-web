- name: Deploy Web chuyên nghiệp
  hosts: all
  become: yes
  tasks:
    - name: 1. Đảm bảo Nginx luôn hiện diện
      apt:
        name: nginx
        state: present

    - name: 2. Xóa code cũ để tránh rác (Nếu cần)
      file:
        path: /var/www/app/
        state: absent

    - name: 3. Tạo lại folder sạch sẽ
      file:
        path: /var/www/app/
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: 4. Chép code mới sang (Từ máy ảo sang VPS)
      copy:
        src: index.html
        dest: /var/www/app/

    - name: 5. Cấu hình Nginx tối ưu (Chống cache số điện thoại cũ)
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80;
              root /var/www/html;
              index index.html;
              location / {
                  try_files $uri $uri/ =404;
                  add_header Cache-Control "no-cache, no-store, must-revalidate";
              }
          }

    - name: 6. Kiểm tra cấu hình và Restart Nginx
      service:
        name: nginx
        state: restarted
